<script>
(function () {
  const durationMinutes = 10;
  const storageKey = "vsl_countdown_end_time_10m_v11";
  const countdownEl = document.getElementById("vsl-countdown");
  let endTime = localStorage.getItem(storageKey);
  if (!endTime) {
    endTime = Date.now() + durationMinutes * 60 * 1000;
    localStorage.setItem(storageKey, String(endTime));
  } else {
    endTime = parseInt(endTime, 10);
  }
  function formatTime(ms) {
    const totalSeconds = Math.max(0, Math.floor(ms / 1000));
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  }
  function updateCountdown() {
    const remaining = endTime - Date.now();
    countdownEl.textContent = remaining <= 0 ? "00:00" : formatTime(remaining);
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);
})();
</script>

<!-- Exibe o botão após o fim do vídeo via evento Vturb -->
<script>
(function() {
  function showCTA() {
    var sec = document.getElementById("cta-section");
    if (sec) { sec.classList.add("visible"); sec.scrollIntoView({ behavior: "smooth", block: "center" }); }
  }

  // Escuta evento nativo do Vturb (smartplayer ended)
  document.addEventListener("vturb:ended", showCTA);
  document.addEventListener("smartplayer:ended", showCTA);

  // Fallback: observa se o botão do próprio player aparecer no DOM (Vturb injeta um botão interno)
  // e também expõe showCTA globalmente para testes manuais
  window.showCTAButton = showCTA;

  // Polyfill: caso o player dispare evento customizado em window
  window.addEventListener("message", function(e) {
    try {
      var d = typeof e.data === "string" ? JSON.parse(e.data) : e.data;
      if (d && (d.event === "ended" || d.type === "ended")) showCTA();
    } catch(err) {}
  });
})();
</script>
